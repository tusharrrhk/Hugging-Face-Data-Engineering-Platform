
version: 2

models:
  - name: stg_hf_models
    description: "Cleaned model metadata from HuggingFace Hub"
    columns:
      - name: model_id
        description: "Unique model identifier (e.g. 'meta-llama/Llama-2-7b')"
        tests:
          - not_null          
          - unique            

      - name: downloads_count
        description: "Total number of model downloads"
        tests:
          - not_null
          - dbt_utils.accepted_range:  
              config:
                min_value: 0

      - name: pipeline_tag
        description: "ML task type"
        tests:
          - accepted_values:
              arguments:
                values:
                  - 'text-generation'
                  - 'text-classification'
                  - 'token-classification'
                  - 'question-answering'
                  - 'summarization'
                  - 'translation'
                  - 'image-classification'
                  - 'object-detection'
                  - 'image-segmentation'
                  - 'automatic-speech-recognition'
                  - 'audio-classification'
                  - 'text-to-image'
                  - 'image-to-text'
                  - 'sentence-similarity'
                  - 'feature-extraction'
                  - 'fill-mask'
                  - 'zero-shot-classification'
                  - 'reinforcement-learning'
                  - 'robotics'
                  - 'tabular-classification'
              config:
                severity: warn
                