# .github/workflows/dbt_ci.yml
name: dbt CI Pipeline

# Trigger: runs when anyone opens a Pull Request to main branch
on:
  pull_request:
    branches: [main]
    paths:
      - 'dbt/**'          # Only run if dbt files changed

jobs:
  dbt-ci:
    name: dbt Lint, Compile & Test
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dbt + dependencies
      - name: Install dbt
        run: |
          pip install dbt-core dbt-snowflake
          cd dbt && dbt deps

      # 4. Compile dbt (checks SQL syntax without running)
      - name: dbt Compile
        working-directory: dbt
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:    ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:${{ secrets.SNOWFLAKE_PASSWORD }}
        run: dbt compile --target dev

      # 5. Run dbt on a dev schema (won't touch prod)
      - name: dbt Run (dev)
        working-directory: dbt
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:    ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:${{ secrets.SNOWFLAKE_PASSWORD }}
        run: dbt run --target dev --select state:modified+  # Only changed models

      # 6. Run all dbt tests
      - name: dbt Test
        working-directory: dbt
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:    ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:${{ secrets.SNOWFLAKE_PASSWORD }}
        run: dbt test --target dev

      # 7. Generate dbt docs (artifact for review)
      - name: Generate dbt Docs
        working-directory: dbt
        run: dbt docs generate

      - name: Upload dbt Docs
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: dbt/target/