# .github/workflows/dbt_ci.yml
name: dbt CI Pipeline

on:
  pull_request:
    branches: [main]
    paths:
      - 'dbt/**'

jobs:
  dbt-ci:
    name: dbt Lint, Compile & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: |
          pip install dbt-core dbt-snowflake
          cd dbt/hf_analytics && dbt deps

      - name: Create profiles.yml
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          printf 'hf_analytics:\n  target: dev\n  outputs:\n    dev:\n      type: snowflake\n      account: "%s"\n      user: "%s"\n      password: "%s"\n      role: ACCOUNTADMIN\n      database: HF_ANALYTICS\n      warehouse: COMPUTE_WH\n      schema: STAGING\n      threads: 1\n    prod:\n      type: snowflake\n      account: "%s"\n      user: "%s"\n      password: "%s"\n      role: ACCOUNTADMIN\n      database: HF_ANALYTICS\n      warehouse: COMPUTE_WH\n      schema: STAGING\n      threads: 4\n' \
            "$SNOWFLAKE_ACCOUNT" "$SNOWFLAKE_USER" "$SNOWFLAKE_PASSWORD" \
            "$SNOWFLAKE_ACCOUNT" "$SNOWFLAKE_USER" "$SNOWFLAKE_PASSWORD" \
            > dbt/hf_analytics/profiles.yml

      - name: dbt Compile
        working-directory: dbt/hf_analytics
        run: dbt compile --target dev --profiles-dir .

      - name: dbt Run (dev)
        working-directory: dbt/hf_analytics
        run: dbt run --target dev --profiles-dir .

      - name: dbt Test
        working-directory: dbt/hf_analytics
        run: dbt test --target dev --profiles-dir .

      - name: Generate dbt Docs
        working-directory: dbt/hf_analytics
        run: dbt docs generate --profiles-dir .

      - name: Upload dbt Docs
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: dbt/hf_analytics/target/
