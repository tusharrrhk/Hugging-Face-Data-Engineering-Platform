# .github/workflows/dbt_ci.yml
name: dbt CI Pipeline

on:
  pull_request:
    branches: [main]
    paths:
      - 'dbt/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dbt-ci:
    name: dbt Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-snowflake==1.11.0

      - name: Create profiles.yml
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python - <<'PYEOF'
          import os, pathlib
          content = f"""hf_analytics:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: "{os.environ['SNOWFLAKE_ACCOUNT']}"
                user: "{os.environ['SNOWFLAKE_USER']}"
                password: "{os.environ['SNOWFLAKE_PASSWORD']}"
                role: ACCOUNTADMIN
                database: HF_ANALYTICS
                warehouse: COMPUTE_WH
                schema: STAGING
                threads: 1
                client_session_keep_alive: false
          """
          p = pathlib.Path.home() / ".dbt" / "profiles.yml"
          p.parent.mkdir(exist_ok=True)
          p.write_text(content)
          PYEOF

      - name: dbt deps
        working-directory: dbt/hf_analytics    
        run: dbt deps

      - name: dbt compile
        working-directory: dbt/hf_analytics    
        run: dbt compile --target dev --profiles-dir ~/.dbt

      - name: dbt run
        working-directory: dbt/hf_analytics    
        run: dbt run --target dev --profiles-dir ~/.dbt

      - name: dbt test
        working-directory: dbt/hf_analytics    
        run: dbt test --target dev --profiles-dir ~/.dbt