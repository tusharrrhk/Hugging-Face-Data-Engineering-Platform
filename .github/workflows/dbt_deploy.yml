# .github/workflows/dbt_deploy.yml
name: dbt Production Deploy

on:
  push:
    branches: [main]
    paths:
      - 'dbt/**'

jobs:
  dbt-deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: |
          pip install dbt-core dbt-snowflake
          cd dbt/hf_analytics && dbt deps

      - name: Create profiles.yml
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python3 - <<PYEOF
          import os
          content = f"""hf_analytics:
            target: prod
            outputs:
              dev:
                type: snowflake
                account: {os.environ['SNOWFLAKE_ACCOUNT']}
                user: {os.environ['SNOWFLAKE_USER']}
                password: {os.environ['SNOWFLAKE_PASSWORD']}
                role: ACCOUNTADMIN
                database: HF_ANALYTICS
                warehouse: COMPUTE_WH
                schema: STAGING
                threads: 1
              prod:
                type: snowflake
                account: {os.environ['SNOWFLAKE_ACCOUNT']}
                user: {os.environ['SNOWFLAKE_USER']}
                password: {os.environ['SNOWFLAKE_PASSWORD']}
                role: ACCOUNTADMIN
                database: HF_ANALYTICS
                warehouse: COMPUTE_WH
                schema: STAGING
                threads: 4
          """
          with open('dbt/hf_analytics/profiles.yml', 'w') as f:
              f.write(content)
          PYEOF

      - name: dbt Snapshot
        working-directory: dbt/hf_analytics
        run: dbt snapshot --target prod --profiles-dir .

      - name: dbt Run (Production)
        working-directory: dbt/hf_analytics
        run: dbt run --target prod --profiles-dir .

      - name: dbt Test (Production)
        working-directory: dbt/hf_analytics
        run: dbt test --target prod --profiles-dir .
