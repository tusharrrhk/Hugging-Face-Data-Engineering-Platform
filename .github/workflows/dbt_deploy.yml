# .github/workflows/dbt_deploy.yml
name: dbt Production Deploy

on:
  push:
    branches: [main]
    paths:
      - 'dbt/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # fixes Node.js 20 warning

jobs:
  dbt-deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-snowflake==1.11.0

      - name: Create profiles.yml
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python - <<'PYEOF'
          import os, pathlib
          content = f"""hf_analytics:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: "{os.environ['SNOWFLAKE_ACCOUNT']}"
                user: "{os.environ['SNOWFLAKE_USER']}"
                password: "{os.environ['SNOWFLAKE_PASSWORD']}"
                role: ACCOUNTADMIN
                database: HF_ANALYTICS
                warehouse: COMPUTE_WH
                schema: MARTS
                threads: 4
                client_session_keep_alive: false
          """
          p = pathlib.Path.home() / ".dbt" / "profiles.yml"
          p.parent.mkdir(exist_ok=True)
          p.write_text(content)
          print("profiles.yml written OK")
          PYEOF

      - name: dbt deps
        working-directory: dbt/hf_analytics    
        run: dbt deps

      - name: dbt seed
        working-directory: dbt/hf_analytics
        run: dbt seed --target prod --profiles-dir ~/.dbt

      - name: dbt Snapshot
        working-directory: dbt/hf_analytics 
        run: dbt snapshot --target prod --profiles-dir ~/.dbt

      - name: dbt Run
        working-directory: dbt/hf_analytics 
        run: dbt run --target prod --profiles-dir ~/.dbt

      - name: dbt Test
        working-directory: dbt/hf_analytics 
        run: dbt test --target prod --profiles-dir ~/.dbt