# .github/workflows/dbt_deploy.yml
name: dbt Production Deploy

on:
  push:
    branches: [main]
    paths:
      - 'dbt/**'

jobs:
  dbt-deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: |
          pip install dbt-core dbt-snowflake
          cd dbt/hf_analytics && dbt deps

      - name: Create profiles.yml
        run: |
          cat > dbt/hf_analytics/profiles.yml << EOF
          hf_analytics:
            target: prod
            outputs:
              dev:
                type: snowflake
                account: "${{ secrets.SNOWFLAKE_ACCOUNT }}"
                user: "${{ secrets.SNOWFLAKE_USER }}"
                password: "${{ secrets.SNOWFLAKE_PASSWORD }}"
                role: ACCOUNTADMIN
                database: HF_ANALYTICS
                warehouse: COMPUTE_WH
                schema: STAGING
                threads: 1
              prod:
                type: snowflake
                account: "${{ secrets.SNOWFLAKE_ACCOUNT }}"
                user: "${{ secrets.SNOWFLAKE_USER }}"
                password: "${{ secrets.SNOWFLAKE_PASSWORD }}"
                role: ACCOUNTADMIN
                database: HF_ANALYTICS
                warehouse: COMPUTE_WH
                schema: STAGING
                threads: 4
          EOF

      - name: dbt Snapshot
        working-directory: dbt/hf_analytics
        run: dbt snapshot --target prod --profiles-dir .

      - name: dbt Run (Production)
        working-directory: dbt/hf_analytics
        run: dbt run --target prod --profiles-dir .

      - name: dbt Test (Production)
        working-directory: dbt/hf_analytics
        run: dbt test --target prod --profiles-dir .