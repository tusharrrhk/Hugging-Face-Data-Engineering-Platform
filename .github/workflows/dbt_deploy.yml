# .github/workflows/dbt_deploy.yml
name: dbt Production Deploy

on:
  push:
    branches: [main]
    paths:
      - 'dbt/**'

jobs:
  dbt-deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: |
          pip install dbt-core dbt-snowflake
          cd dbt/hf_analytics && dbt deps

      - name: Create profiles.yml
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          printf 'hf_analytics:\n  target: prod\n  outputs:\n    dev:\n      type: snowflake\n      account: "%s"\n      user: "%s"\n      password: "%s"\n      role: ACCOUNTADMIN\n      database: HF_ANALYTICS\n      warehouse: COMPUTE_WH\n      schema: STAGING\n      threads: 1\n    prod:\n      type: snowflake\n      account: "%s"\n      user: "%s"\n      password: "%s"\n      role: ACCOUNTADMIN\n      database: HF_ANALYTICS\n      warehouse: COMPUTE_WH\n      schema: STAGING\n      threads: 4\n' \
            "$SNOWFLAKE_ACCOUNT" "$SNOWFLAKE_USER" "$SNOWFLAKE_PASSWORD" \
            "$SNOWFLAKE_ACCOUNT" "$SNOWFLAKE_USER" "$SNOWFLAKE_PASSWORD" \
            > dbt/hf_analytics/profiles.yml

      - name: dbt Snapshot
        working-directory: dbt/hf_analytics
        run: dbt snapshot --target prod --profiles-dir .

      - name: dbt Run (Production)
        working-directory: dbt/hf_analytics
        run: dbt run --target prod --profiles-dir .

      - name: dbt Test (Production)
        working-directory: dbt/hf_analytics
        run: dbt test --target prod --profiles-dir .
